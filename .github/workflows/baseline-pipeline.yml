# =========================================================
# Baseline Pipeline — Tanpa Enhancement Supply Chain Security
# =========================================================
# Pipeline ini merepresentasikan state SEBELUM implementasi
# SBOM, vulnerability scanning, dan artifact signing.
# Digunakan sebagai baseline untuk perbandingan metrik.
# =========================================================

name: Baseline Pipeline (Before Enhancement)

on:
  workflow_dispatch:       # Manual trigger untuk perbandingan

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}/devsecops-demo
  IMAGE_TAG: baseline-${{ github.sha }}

jobs:
  # =====================================================
  # Job 1: Build & Test
  # =====================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Run tests
        working-directory: ./app
        run: npm test

      # ⚠️ Tidak ada SBOM generation
      # ⚠️ Tidak ada vulnerability scanning
      # ⚠️ Tidak ada artifact signing

  # =====================================================
  # Job 2: Build & Push Docker Image
  # =====================================================
  build-image:
    name: Build & Push Image
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        working-directory: ./app
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ${{ env.IMAGE_NAME }}:baseline-latest

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_NAME }}:baseline-latest

      - name: Publish Build Summary
        run: |
          echo "## 🐳 Baseline Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Registry | GitHub Container Registry |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Status | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Time | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Security Capabilities (This Pipeline)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Capability | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build Application | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Testing | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image Build | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image Push | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Verification | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability Scan | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Gate | ❌ |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Signing | ❌ |" >> $GITHUB_STEP_SUMMARY

      # ⚠️ Image di-push TANPA:
      #   - SBOM (tidak tahu dependensi apa yang ada di dalam image)
      #   - Vulnerability scan (tidak tahu apakah ada CVE)
      #   - Signature (tidak bisa verifikasi integritas image)
      #   - Provenance (tidak tahu siapa yang build)

  # =====================================================
  # Job 3: Deploy (Simplified)
  # =====================================================
  deploy:
    name: Deploy
    needs: build-image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment
        run: |
          echo "============================================"
          echo "  BASELINE DEPLOYMENT (No Security Checks)"
          echo "============================================"
          echo ""
          echo "Image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo ""
          echo "⚠️  WARNING: This deployment has NO supply chain security:"
          echo "   ❌ No SBOM — unknown dependencies"
          echo "   ❌ No vulnerability scan — unknown CVEs"
          echo "   ❌ No artifact signing — unverified integrity"
          echo "   ❌ No provenance — unknown build origin"
          echo ""
          echo "Deploy completed at: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

      - name: Publish Deployment Summary
        run: |
          echo "## 🚀 Baseline Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image Built | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Published | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment Executed | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Validation | ❌ Not Performed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚨 Security Risks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Unknown software dependencies (no SBOM)." >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerabilities not detected before deployment." >> $GITHUB_STEP_SUMMARY
          echo "- Image authenticity cannot be verified (no signing)." >> $GITHUB_STEP_SUMMARY
          echo "- No software supply chain visibility." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Comparison with Enhanced Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feature | Baseline | Enhanced |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build & Test | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Image | ✅ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| SBOM Generation | ❌ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Verification | ❌ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Vulnerability Scan | ❌ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Gate | ❌ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Signing | ❌ | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎓 Research Alignment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Research | Baseline Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Xia et al. (2023) | Not Implemented |" >> $GITHUB_STEP_SUMMARY
          echo "| O'Donoghue et al. (2024) | Not Implemented |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> This baseline represents a traditional CI/CD pipeline without supply chain security controls, motivating the enhanced pipeline implementation." >> $GITHUB_STEP_SUMMARY
